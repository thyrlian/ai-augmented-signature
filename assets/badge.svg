    L 636.0 360.0 L 619.8 371.3 L 634.9 384.1 L 617.8 393.9 L 631.8 407.9 L 613.8 416.3
    L 626.6 431.4 L 608.0 438.2 L 619.4 454.4 L 600.2 459.5 L 610.1 476.6 L 590.6 480.1
    L 599.0 498.0 L 579.3 499.7 L 586.1 518.3 L 566.3 518.3 L 571.4 537.4 L 551.7 535.7
