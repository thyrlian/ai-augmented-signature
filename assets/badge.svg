  <!-- Clean circular rings -->
  <circle cx="360" cy="360" r="255" fill="#d1d5db"/>
  <circle cx="360" cy="360" r="238" fill="#f7f3e8"/>
  <circle cx="360" cy="360" r="232" fill="#f7f3e8" stroke="#ffffff" stroke-width="16" filter="url(#softShadow)"/>
  <circle cx="360" cy="360" r="214" fill="none" stroke="#d1d5db" stroke-width="2"/>

  <!-- Outer principle text -->
  <text font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="22"
        font-weight="700"
        letter-spacing="5"
        fill="#374151">
    <textPath href="#topArcText" startOffset="50%" text-anchor="middle">
      HUMAN IN CONTROL
    </textPath>
  </text>

  <text font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="22"
        font-weight="700"
        letter-spacing="5"
        fill="#374151">
    <textPath href="#bottomArcText" startOffset="50%" text-anchor="middle">
      AI ON DEMAND
    </textPath>
  </text>

  <!-- Ribbon tails -->
  <g filter="url(#softShadow)">
    <path d="M84 318 h118 v96 H84 l36-48z" fill="#991b1b"/>
    <path d="M636 318 H518 v96 h118 l-36-48z" fill="#991b1b"/>
  </g>

  <!-- Main ribbon -->
  <rect x="150" y="300" width="420" height="132" rx="4" fill="url(#ribbonGradient)" filter="url(#softShadow)"/>
  <rect x="164" y="314" width="392" height="104" rx="2" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="3"/>

  <!-- Main slogan -->
  <text x="360" y="353" text-anchor="middle"
        font-family="'Segoe Script', 'Bradley Hand', 'Comic Sans MS', cursive"
        font-size="38"
        font-weight="700"
        letter-spacing="0.5"
        fill="#fff7ed">
    Driven by Human
  </text>

  <text x="360" y="398" text-anchor="middle"
        font-family="'Courier New', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="28"
        font-weight="700"
        letter-spacing="1.4"
        fill="#e0f2fe">
