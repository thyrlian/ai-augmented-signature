<svg width="720" height="720" viewBox="0 0 720 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Driven by Human, Augmented by AI Badge</title>
  <desc id="desc">A circular open-source badge with a serrated outer seal, modern circular text, and the slogan Driven by Human, Augmented by AI.</desc>

  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#111827" flood-opacity="0.18"/>
    </filter>

    <linearGradient id="ribbonGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e34a4a"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>

    <linearGradient id="sealRingGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d1d5db"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>

    <!-- Top spacing kept as before. Bottom spacing increased slightly by moving text inward. -->
    <path id="topArcText" d="M 175 360 A 185 185 0 0 1 545 360"/>
    <path id="bottomArcText" d="M 162 360 A 198 198 0 0 0 558 360"/>
  </defs>

  <rect width="720" height="720" fill="#ffffff"/>

